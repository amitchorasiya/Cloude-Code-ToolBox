# Build JetBrains Platform plugin (preview) — Gradle buildPlugin on Ubuntu + JDK 21.
name: IntelliJ plugin CI

on:
  push:
    paths:
      - "packages/cloude-code-toolbox-intellij/**"
      - ".github/workflows/intellij-ci.yml"
  pull_request:
    paths:
      - "packages/cloude-code-toolbox-intellij/**"
      - ".github/workflows/intellij-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cloude-code-toolbox-intellij
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Gradle buildPlugin
        run: chmod +x gradlew && ./gradlew buildPlugin --no-daemon
